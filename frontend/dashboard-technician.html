<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Dashboard - College Technical Issue Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Technician Dashboard -->
    <div class="page active">
        <nav class="dashboard-nav">
            <div class="nav-brand">
                <i class="fas fa-tools"></i>
                <span>Technician Portal</span>
            </div>
            <div class="nav-user">
                <div style="text-align:right">
                    <div id="techName" style="font-weight:600"></div>
                    <div id="techEmail" style="font-size:0.85rem;color:#f3f4f6"></div>
                    <div id="techSpecialization" style="font-size:0.85rem;color:#f3f4f6"></div>
                </div>
                <button class="btn" id="notifBtn" onclick="openNotifModal()" title="Notifications" style="margin-right:0.6rem">
                    <i class="fas fa-bell"></i> <span id="notifCount" style="background:#ef4444;color:#fff;padding:2px 6px;border-radius:12px;margin-left:6px;font-size:0.8rem;display:none">0</span>
                </button>
                <button class="btn btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </nav>
        
        <div class="technician-content">
            <div class="tech-stats-grid">
                <div class="stat-card">
                    <i class="fas fa-tasks"></i>
                    <h3 id="techTotalTasks">0</h3>
                    <p>Total Tasks</p>
                </div>
                <div class="stat-card pending">
                    <i class="fas fa-clock"></i>
                    <h3 id="techPendingTasks">0</h3>
                    <p>Pending Tasks</p>
                </div>
                <div class="stat-card resolved">
                    <i class="fas fa-check-circle"></i>
                    <h3 id="techCompletedTasks">0</h3>
                    <p>Completed Tasks</p>
                </div>
                <div class="stat-card rating">
                    <i class="fas fa-star"></i>
                    <h3 id="techRating">0.0</h3>
                    <p>Average Rating</p>
                </div>
            </div>
            
            <div class="task-container">
                <h2><i class="fas fa-clipboard-list"></i> My Tasks</h2>
                <div class="task-filters">
                    <button class="filter-btn active" onclick="filterTasks('all')">All</button>
                    <button class="filter-btn" onclick="filterTasks('assigned')">Assigned</button>
                    <button class="filter-btn" onclick="filterTasks('resolved')">Completed</button>
                </div>
                <div id="techTaskList" class="task-list"></div>
            </div>
        </div>
    </div>

    <!-- Assign Issue Modal -->
    <div id="assignModal" class="modal" style="display:none; position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:2000;">
        <div class="modal-content" style="background:#fff;padding:1.5rem;border-radius:10px;max-width:480px;width:90%;">
            <h3 style="margin-top:0">Assign Issue</h3>
            <p id="assignIssueInfo" style="color:#374151;font-size:0.95rem;"></p>
            <div style="margin:0.5rem 0">
                <label style="display:block;margin-bottom:0.5rem">Choose Technician</label>
                <select id="assignTechSelect" style="width:100%;padding:0.5rem;border:1px solid #e5e7eb;border-radius:6px"></select>
            </div>
            <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1rem">
                <button onclick="closeAssignModal()" class="btn btn-secondary">Cancel</button>
                <button id="confirmAssignBtn" class="btn btn-primary">Assign</button>
            </div>
        </div>
    </div>

    <!-- Notifications Modal -->
    <div id="notifModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:2100;">
        <div style="background:#fff; max-width:600px; width:95%; border-radius:10px; padding:1rem; max-height:80vh; overflow:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0">Notifications</h3>
                <div>
                    <button class="btn btn-secondary" onclick="closeNotifModal()">Close</button>
                </div>
            </div>
            <div id="notifList" style="margin-top:1rem; display:grid; gap:0.6rem;"></div>
            <div id="noNotif" style="display:none; padding:1rem; color:#6b7280;">No notifications</div>
        </div>
    </div>

    <!-- Feedback Modal -->
    <div id="feedbackModal" class="feedback-modal" aria-hidden="true">
        <div class="feedback-content">
            <h2>Give Feedback</h2>
            <div id="feedbackList" style="margin-bottom:1rem"></div>

            <div id="feedbackForm" style="display:none">
                <div style="text-align:center">
                    <div class="star-rating" id="starRating">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                    </div>
                </div>
                <textarea id="feedbackComment" class="feedback-comment" placeholder="Write your comments (optional)"></textarea>
                <div class="feedback-actions">
                    <button class="btn btn-secondary" onclick="closeFeedbackCenter()">Cancel</button>
                    <button class="btn btn-primary" onclick="submitFeedback()">Submit Feedback</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            const storedUser = localStorage.getItem('currentUser');
            const storedType = localStorage.getItem('currentUserType');
            const storedToken = localStorage.getItem('currentToken');
            
            if (!storedUser || !storedType || !storedToken || storedType !== 'technician') {
                window.location.href = 'index.html';
                return;
            }
            
            currentUser = { ...JSON.parse(storedUser), type: 'technician' };
            currentUserType = storedType;
            currentToken = storedToken;
            
            loadTechnicianDashboard();
        });
    </script>
</body>
</html>
