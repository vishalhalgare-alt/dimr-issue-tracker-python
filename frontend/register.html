<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - College Technical Issue Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Register Page -->
    <div class="container">
        <div class="register-box">
            <button class="back-btn" onclick="window.location.href='login.html'">
                <i class="fas fa-arrow-left"></i> Back to Login
            </button>

            <div class="register-header">
                <div class="register-icon" id="registerIcon"><i class="fas fa-user-plus"></i></div>
                <h2 id="registerTitle">Create Account</h2>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="regName" required placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone Number</label>
                        <input type="tel" id="regPhone" required placeholder="10-digit mobile number" pattern="[0-9]{10}">
                    </div>
                </div>

                <div id="studentFields" style="display:none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-book"></i> Course</label>
                            <select id="regCourse">
                                <option value="MCA">MCA (Master of Computer Applications)</option>
                                <option value="MBA">MBA (Master of Business Administration)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-layer-group"></i> Division</label>
                            <select id="regDivision">
                                <option value="A">Division A</option>
                                <option value="B">Division B</option>
                                <option value="C">Division C</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="regEmail" required placeholder="your.email@example.com">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="regPassword" required placeholder="Create strong password" minlength="6">
                    </div>
                </div>

                <div id="registerError" class="error-message"></div>
                <div id="registerSuccess" class="success-message"></div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i> Register Account
                </button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Get role from URL parameter if any
        const urlParams = new URLSearchParams(window.location.search);
        const userType = urlParams.get('role') || 'student';
        currentUserType = userType;

        // Set register UI based on role
        const registerIcon = document.getElementById('registerIcon');
        const registerTitle = document.getElementById('registerTitle');

        if (userType === 'teacher') {
            registerIcon.innerHTML = '<i class="fas fa-chalkboard-teacher"></i>';
            registerTitle.textContent = 'Teacher Registration';
            document.getElementById('studentFields').style.display = 'none';
        } else if (userType === 'student') {
            registerIcon.innerHTML = '<i class="fas fa-user-graduate"></i>';
            registerTitle.textContent = 'Student Registration';
            document.getElementById('studentFields').style.display = 'block';
        } else if (userType === 'technician') {
            registerIcon.innerHTML = '<i class="fas fa-tools"></i>';
            registerTitle.textContent = 'Technician Registration';
            document.getElementById('studentFields').style.display = 'none';
        }

        document.getElementById('registerForm').reset();
        document.getElementById('registerError').classList.remove('show');
        document.getElementById('registerSuccess').classList.remove('show');
    </script>
</body>
</html>
